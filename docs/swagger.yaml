basePath: /v1
definitions:
  dto.AdminAnnouncementResponse:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      isBanner:
        type: boolean
      title:
        type: string
    type: object
  dto.AdminAnnouncementUpsertRequest:
    properties:
      content:
        type: string
      isActive:
        type: boolean
      isBanner:
        type: boolean
      title:
        type: string
    required:
    - content
    - isActive
    - isBanner
    - title
    type: object
  dto.AdminAppVersionResponse:
    properties:
      createdAt:
        type: string
      downloadUrl:
        type: string
      id:
        type: string
      isForceUpdate:
        type: boolean
      platform:
        type: string
      releaseNotes:
        type: string
      versionCode:
        type: integer
      versionName:
        type: string
    type: object
  dto.AdminAppVersionUpsertRequest:
    properties:
      downloadUrl:
        type: string
      isForceUpdate:
        type: boolean
      platform:
        enum:
        - ios
        - android
        type: string
      releaseNotes:
        type: string
      versionCode:
        type: integer
      versionName:
        type: string
    required:
    - downloadUrl
    - isForceUpdate
    - platform
    - releaseNotes
    - versionCode
    - versionName
    type: object
  dto.AnnouncementResponse:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isBanner:
        type: boolean
      title:
        type: string
    type: object
  dto.AppVersionResponse:
    properties:
      createdAt:
        type: string
      downloadUrl:
        type: string
      isForceUpdate:
        type: boolean
      platform:
        type: string
      releaseNotes:
        type: string
      versionCode:
        type: integer
      versionName:
        type: string
    type: object
  dto.CampusMapFeatureResponse:
    properties:
      geometry:
        $ref: '#/definitions/model.FeatureGeometry'
      properties:
        $ref: '#/definitions/model.FeatureProperties'
      type:
        type: string
    type: object
  dto.CampusMapResponse:
    properties:
      features:
        items:
          $ref: '#/definitions/dto.CampusMapFeatureResponse'
        type: array
      type:
        type: string
    type: object
  dto.CheckAppVersionResponse:
    properties:
      hasUpdate:
        type: boolean
      isForceUpdate:
        type: boolean
      latestVersion:
        $ref: '#/definitions/dto.AppVersionResponse'
    type: object
  dto.ElectricityTaskOption:
    properties:
      building:
        type: string
      campus:
        type: string
      notifyTime:
        type: string
      room:
        type: string
    required:
    - building
    - campus
    - notifyTime
    - room
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  dto.LoginResponse:
    properties:
      profile:
        $ref: '#/definitions/sso.Profile'
      token:
        type: string
    type: object
  dto.SemesterCalendarDetailResponse:
    properties:
      calendarEnd:
        type: string
      calendarStart:
        type: string
      customWeekRanges:
        items:
          $ref: '#/definitions/model.CustomWeekRange'
        type: array
      notes:
        items:
          $ref: '#/definitions/model.CalendarNote'
        type: array
      semesterCode:
        type: string
      semesterEnd:
        type: string
      semesterStart:
        type: string
      subtitle:
        type: string
      title:
        type: string
    type: object
  dto.SemesterCalendarListResponse:
    properties:
      semesterCode:
        type: string
      subtitle:
        type: string
      title:
        type: string
    type: object
  dto.SyncElectricityTaskRequest:
    properties:
      deviceToken:
        type: string
      tasks:
        items:
          $ref: '#/definitions/dto.ElectricityTaskOption'
        type: array
    required:
    - deviceToken
    type: object
  model.CalendarNote:
    properties:
      content:
        type: string
      needNumber:
        type: boolean
      row:
        type: integer
    type: object
  model.CustomWeekRange:
    properties:
      content:
        type: string
      endRow:
        type: integer
      startRow:
        type: integer
    type: object
  model.FeatureGeometry:
    properties:
      coordinates:
        items:
          items:
            items:
              format: float64
              type: number
            type: array
          type: array
        type: array
      type:
        type: string
    type: object
  model.FeatureProperties:
    properties:
      campus:
        type: string
      category:
        type: string
      name:
        type: string
    type: object
  sso.Profile:
    properties:
      avatar:
        description: 最终头像链接
        type: string
      categoryName:
        description: 学生类别
        type: string
      certCode:
        description: 身份证号（打码）
        type: string
      defaultUserAvatar:
        description: 默认头像链接
        type: string
      deptName:
        description: 学院名称
        type: string
      email:
        description: 邮箱
        type: string
      headImageIcon:
        description: 用户设置的头像链接
        type: string
      phone:
        description: 手机号（打码）
        type: string
      userAccount:
        description: 学号
        type: string
      userName:
        description: 姓名
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: go-csust-planet 项目的 API 接口文档
  title: go-csust-planet API
  version: "1.0"
paths:
  /admin/announcements:
    get:
      description: 获取全部公告列表，按创建时间倒序排列
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AdminAnnouncementResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取后台公告列表
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 创建一条新的后台公告
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 公告信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminAnnouncementUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AdminAnnouncementResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 创建公告
      tags:
      - admin
  /admin/announcements/{id}:
    delete:
      description: 根据公告ID删除后台公告
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 公告ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 删除公告
      tags:
      - admin
    get:
      description: 根据公告ID获取后台公告详情
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 公告ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdminAnnouncementResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取后台公告详情
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 根据公告ID更新后台公告
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 公告ID
        in: path
        name: id
        required: true
        type: string
      - description: 公告信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminAnnouncementUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdminAnnouncementResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 更新公告
      tags:
      - admin
  /admin/app-versions:
    get:
      description: 获取全部 App 版本列表，按平台升序、版本号降序排列
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AdminAppVersionResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取后台 App 版本列表
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 创建一条新的 App 版本记录
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 版本信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminAppVersionUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AdminAppVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 创建 App 版本
      tags:
      - admin
  /admin/app-versions/{id}:
    delete:
      description: 根据版本ID删除 App 版本
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 版本ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 删除 App 版本
      tags:
      - admin
    get:
      description: 根据版本ID获取后台 App 版本详情
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 版本ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdminAppVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取后台 App 版本详情
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 根据版本ID更新 App 版本信息
      parameters:
      - description: Bearer admin token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 版本ID
        in: path
        name: id
        required: true
        type: string
      - description: 版本信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminAppVersionUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdminAppVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 更新 App 版本
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用Token进行登录，如果用户不存在则自动注册。登录成功后返回含有JWT的凭证信息。
      parameters:
      - description: 登录请求，需包含获取的token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 用户登录
      tags:
      - auth
  /config/announcements:
    get:
      description: 获取当前生效的公告列表，按创建时间倒序排列
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AnnouncementResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取公告列表
      tags:
      - config
  /config/app-versions:
    get:
      description: 获取指定平台的所有App版本历史
      parameters:
      - description: 平台(ios或android)
        enum:
        - ios
        - android
        in: query
        name: platform
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AppVersionResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取App所有版本
      tags:
      - config
  /config/app-versions/check:
    get:
      description: 检查指定平台的App是否有更新
      parameters:
      - description: 平台(ios或android)
        enum:
        - ios
        - android
        in: query
        name: platform
        required: true
        type: string
      - description: 当前版本号
        in: query
        name: currentVersionCode
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CheckAppVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 检查App版本更新
      tags:
      - config
  /config/campus-map:
    get:
      description: 获取GeoJSON格式的校园地图数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CampusMapResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取校园地图数据
      tags:
      - config
  /config/semester-calendars:
    get:
      description: 获取所有校历的列表，按学期代码倒序排列
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SemesterCalendarListResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取校历列表
      tags:
      - config
  /config/semester-calendars/{semester_code}:
    get:
      description: 根据学期代码获取该学期的详细校历信息
      parameters:
      - description: '学期代码(如: 2024-2025-1)'
        in: path
        name: semester_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SemesterCalendarDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 获取校历详情
      tags:
      - config
  /task/electricity:
    post:
      consumes:
      - application/json
      description: 同步电费定时推送任务
      parameters:
      - description: 任务请求内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SyncElectricityTaskRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 成功，无返回内容
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 同步电费推送任务
      tags:
      - task
swagger: "2.0"
